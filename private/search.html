<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
    
    <style>
        /* === Global & Reset === */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            user-select: none;
            background-color: #030206;
            font-family: 'Inter', sans-serif;
            color: white;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* === Layout & Elements === */
        .bg-gradient {
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            z-index: 0;
            background: linear-gradient(to bottom, #030206, #05040a, #010003);
        }

        #plexusCanvas {
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: block;
            opacity: 0; /* Start hidden for animation */
            animation: plexusReveal 2.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        main {
            position: relative;
            z-index: 20;
            flex: 1 1 0%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 1rem;
            text-align: center;
        }

        h1 {
            font-weight: 100;
            letter-spacing: 0.025em;
            color: rgba(255, 255, 255, 0.95);
            font-size: 1.5rem; /* 3xl */
            line-height: 1.5;    /* normal */
            margin: 0;
        }

        @media (min-width: 768px) {
            h1 {
                font-size: 3rem; /* 5xl */
                line-height: 1.625; /* relaxed */
            }
        }

        @media (min-width: 1024px) {
            h1 {
                font-size: 3.75rem; /* 6xl */
            }
        }

        .magical-text {
            font-weight: 100;
            cursor: default;
            background: linear-gradient(-45deg, #a855f7, #d946ef, #a855f7, #c084fc, #a855f7);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: textGlowPulse 5.5s ease-in-out infinite, magicalGradientMove 4s linear infinite;
            will-change: filter, background-position;
        }

        footer {
            position: relative;
            z-index: 20;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 3rem;
        }

        .footer-text {
            font-size: 11px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            letter-spacing: 0.5em;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            margin-bottom: 4rem;
            cursor: default;
            opacity: 0; /* Start hidden for animation */
            animation: fadeUpBlurIn 2s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
        }

        .underglow-container {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            overflow: visible;
            pointer-events: none;
            z-index: 30;
            opacity: 0; /* Start hidden for animation */
            animation: glowFadeIn 3s ease-in-out 0.5s forwards;
        }

        .underglow-breath {
            position: absolute;
            bottom: -25px;
            left: 50%;
            width: 95vw;
            height: 260px;
            background: radial-gradient(circle, rgba(168,85,247,0.3) 0%, rgba(139,92,246,0.1) 50%, rgba(0,0,0,0) 80%);
            pointer-events: none;
            z-index: 10;
            animation: breathingGlow 6s ease-in-out infinite;
        }

        .underglow-base {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 85vw;
            height: 170px;
            background: linear-gradient(to top, rgba(88, 28, 135, 0.1), transparent);
            filter: blur(40px);
            z-index: 0;
        }

        /* === Canvas Opening Animation === */
        @keyframes plexusReveal {
            0% {
                opacity: 0;
                transform: scale(0.6);
                filter: blur(15px);
            }
            100% {
                opacity: 0.7;
                transform: scale(1);
                filter: blur(0px);
            }
        }

        /* === Main Header Animations === */
        .animate-blur-in {
            animation: cinematicBlurIn 2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cinematicBlurIn {
            0% {
                filter: blur(25px);
                opacity: 0;
                transform: scale(1.03);
            }
            100% {
                filter: blur(0px);
                opacity: 1;
                transform: scale(1);
            }
        }

        /* === Footer Specific Animations === */
        @keyframes fadeUpBlurIn {
            0% {
                opacity: 0;
                transform: translateY(20px);
                filter: blur(10px) drop-shadow(0 0px 0px rgba(0,0,0,0));
            }
            100% {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0px) drop-shadow(0 2px 4px rgba(0,0,0,0.8));
            }
        }

        @keyframes glowFadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* === Ambient Animations === */
        @keyframes breathingGlow {
            0%, 100% {
                opacity: 0.3;
                transform: translateX(-50%) translateY(20px) scale(1);
                filter: blur(40px);
            }
            50% {
                opacity: 0.55;
                transform: translateX(-50%) translateY(20px) scale(1.05);
                filter: blur(50px);
            }
        }

        @keyframes textGlowPulse {
            0%, 100% {
                filter: drop-shadow(0 0 12px rgba(168, 85, 247, 0.5)) drop-shadow(0 0 25px rgba(168, 85, 247, 0.2));
            }
            50% {
                filter: drop-shadow(0 0 20px rgba(192, 132, 252, 0.8)) drop-shadow(0 0 40px rgba(168, 85, 247, 0.4));
            }
        }

        @keyframes magicalGradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>

    <canvas id="plexusCanvas"></canvas>

    <main class="animate-blur-in">
        <h1>
            The system are <span class="magical-text">yours</span>, Ricky.
        </h1>
    </main>

    <footer>
        <div class="footer-text">
            Ready to dive
        </div>

        <div class="underglow-container">
            <div class="underglow-breath"></div>
            <div class="underglow-base"></div>
        </div>
    </footer>

    <script>
        // Mesin Simulasi Jaringan Plexus Kanvas Berkinerja Tinggi
        const canvas = document.getElementById('plexusCanvas');
        const ctx = canvas.getContext('2d');

        let points = [];
        const config = {
            nodeCount: 95,
            baseSpeed: 0.45,
            maxLineDistance: 145,
            mouseReactionDistance: 160,
            themeColor: 'rgba(168, 85, 247, ',
            lineColor: 'rgba(168, 85, 247, '
        };

        const mouse = {
            x: null, y: null,
            targetX: null, targetY: null,
            isActive: false
        };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initializePoints();
        }

        window.addEventListener('resize', resizeCanvas);

        class Point {
            constructor() {
                const safetyMargin = 45;
                this.x = safetyMargin + Math.random() * (canvas.width - safetyMargin * 2);
                this.y = safetyMargin + Math.random() * (canvas.height - safetyMargin * 2);
                
                const moveAngle = Math.random() * Math.PI * 2;
                const velocity = (Math.random() * 0.25 + 0.15) * config.baseSpeed;
                this.vx = Math.cos(moveAngle) * velocity;
                this.vy = Math.sin(moveAngle) * velocity;
                
                this.radius = Math.random() * 1.3 + 0.8;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                const safetyMargin = 45;

                if (this.x < safetyMargin) {
                    this.x = safetyMargin;
                    this.vx = Math.abs(this.vx);
                } else if (this.x > canvas.width - safetyMargin) {
                    this.x = canvas.width - safetyMargin;
                    this.vx = -Math.abs(this.vx);
                }

                if (this.y < safetyMargin) {
                    this.y = safetyMargin;
                    this.vy = Math.abs(this.vy);
                } else if (this.y > canvas.height - safetyMargin) {
                    this.y = canvas.height - safetyMargin;
                    this.vy = -Math.abs(this.vy);
                }

                if (mouse.isActive && mouse.x !== null) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < config.mouseReactionDistance) {
                        const force = (config.mouseReactionDistance - distance) / config.mouseReactionDistance;
                        this.x += (dx / distance) * force * 0.35;
                        this.y += (dy / distance) * force * 0.35;
                    }
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = config.themeColor + '0.75)';
                ctx.fill();
            }
        }

        function initializePoints() {
            points = [];
            for (let i = 0; i < config.nodeCount; i++) {
                points.push(new Point());
            }
        }

        function drawLines() {
            for (let i = 0; i < points.length; i++) {
                for (let j = i + 1; j < points.length; j++) {
                    const p1 = points[i];
                    const p2 = points[j];
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < config.maxLineDistance) {
                        const alpha = (1 - (dist / config.maxLineDistance)) * 0.16;
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = config.lineColor + alpha + ')';
                        ctx.lineWidth = 0.65;
                        ctx.stroke();
                    }
                }

                if (mouse.isActive && mouse.x !== null) {
                    const p1 = points[i];
                    const dx = p1.x - mouse.x;
                    const dy = p1.y - mouse.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < config.mouseReactionDistance) {
                        const alpha = (1 - (dist / config.mouseReactionDistance)) * 0.2;
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(mouse.x, mouse.y);
                        ctx.strokeStyle = config.lineColor + alpha + ')';
                        ctx.lineWidth = 0.75;
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (mouse.targetX !== null) {
                mouse.x += (mouse.targetX - mouse.x) * 0.08;
                mouse.y += (mouse.targetY - mouse.y) * 0.08;
            }

            points.forEach(point => {
                point.update();
                point.draw();
            });

            drawLines();
            requestAnimationFrame(animate);
        }

        window.addEventListener('mousemove', (e) => {
            mouse.isActive = true;
            mouse.targetX = e.clientX;
            mouse.targetY = e.clientY;
        });

        window.addEventListener('mouseleave', () => {
            mouse.isActive = false;
            mouse.targetX = null;
            mouse.targetY = null;
            mouse.x = null;
            mouse.y = null;
        });

        window.addEventListener('touchmove', (e) => {
            mouse.isActive = true;
            if (e.touches.length > 0) {
                mouse.targetX = e.touches[0].clientX;
                mouse.targetY = e.touches[0].clientY;
            }
        });

        window.addEventListener('touchend', () => {
            mouse.isActive = false;
            mouse.targetX = null;
            mouse.targetY = null;
            mouse.x = null;
            mouse.y = null;
        });

        window.onload = function() {
            resizeCanvas();
            animate();
        };
    </script>
</body>
</html>
